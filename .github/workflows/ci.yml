name: CI

on:
  push:
    branches:
      - main
  pull_request:

  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typos:
    name: Spell check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Spell check
        uses: crate-ci/typos@master
        with:
          config: ./.typos.toml

  check:
    name: Compilation Check
    runs-on: ubuntu-latest

    env:
      RUSTFLAGS: "-D warnings"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2.7.8

      - name: Run Clippy
        run: cargo clippy --all-features --all-targets

      - name: Run Composite Request Schema Checks
        run: cargo test -p composite-service --test composite_request_schema_check

      - name: Run UCS Connector Schema Compatibility Check
        run: cargo test -p ucs-connector-tests --lib harness::scenario_api::tests::all_supported_scenarios_match_proto_schema_for_all_connectors -- --exact

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      RUSTFLAGS: "-D warnings"
      CARGO_BUILD_JOBS: "1"
      RUN_TESTS: ${{ (github.event_name == 'push') || ((github.event_name == 'pull_request') && (github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name)) || (github.event_name == 'merge_group') }}

    steps:
      - name: Skip tests for PRs from forks
        if: ${{ env.RUN_TESTS == 'false' }}
        shell: bash
        run: echo 'Skipping tests for PRs from forks'

      - name: Checkout code
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: actions/checkout@v4

      - name: Install Rust
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Protoc
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2.7.8
        if: ${{ env.RUN_TESTS == 'true' }}
        with:
          cache-on-failure: true

      - name: Install nextest
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
          checksum: true

      - name: Download Encrypted Connector Credentials from S3 and Decrypt
        if: ${{ env.RUN_TESTS == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CONNECTOR_CREDS_AWS_ACCESS_KEY_ID }}
          AWS_REGION: ${{ secrets.CONNECTOR_CREDS_AWS_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CONNECTOR_CREDS_AWS_SECRET_ACCESS_KEY }}
          CONNECTOR_AUTH_PASSPHRASE: ${{ secrets.CONNECTOR_AUTH_PASSPHRASE }}
          CONNECTOR_CREDS_S3_BUCKET_URI: ${{ secrets.CONNECTOR_CREDS_S3_BUCKET_URI}}
          DESTINATION_FILE_NAME: "creds.json.gpg"
          S3_SOURCE_FILE_NAME: "b59e91fc-9054-4412-a746-664fdc185345.json.gpg"
        shell: bash
        run: |
          mkdir -p ".github/secrets" ".github/test"

          aws s3 cp "${CONNECTOR_CREDS_S3_BUCKET_URI}/${S3_SOURCE_FILE_NAME}" ".github/secrets/${DESTINATION_FILE_NAME}"
          gpg --quiet --batch --yes --decrypt --passphrase="${CONNECTOR_AUTH_PASSPHRASE}" --output ".github/test/creds.json" ".github/secrets/${DESTINATION_FILE_NAME}"

      - name: Set connector credentials path in environment
        if: ${{ env.RUN_TESTS == 'true' }}
        shell: bash
        run: |
          # Only set the environment variable if the credentials file exists
          if [[ -f ".github/test/creds.json" ]]; then
            echo "CONNECTOR_AUTH_FILE_PATH=${{ github.workspace }}/.github/test/creds.json" >> $GITHUB_ENV
            echo "Connector credentials available for tests"
          else
            echo "No connector credentials available - tests will use default values"
          fi

      - name: Run Tests
        if: ${{ env.RUN_TESTS == 'true' }}
        shell: bash
        run: cargo nextest run --config-file .nextest.toml --profile ci

  formatting:
    name: Check formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt

      - name: Check formatting
        shell: bash
        run: cargo +nightly fmt --all --check

  sdk-test:
    name: SDK Tests
    runs-on: macos-latest

    env:
      RUSTFLAGS: "-D warnings"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python codegen dependencies
        run: make -C sdk install-deps

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-on-failure: true

      - name: Create connector credentials for SDK tests
        shell: bash
        env:
          CONNECTOR_SPECIFIC_AUTH: ${{ secrets.CONNECTOR_SPECIFIC_AUTH }}
        run: |
          if [[ -n "${CONNECTOR_SPECIFIC_AUTH}" ]]; then
            echo "${CONNECTOR_SPECIFIC_AUTH}" > creds.json
            echo "Connector credentials created for SDK tests"
          else
            echo "No CONNECTOR_SPECIFIC_AUTH secret found, will run in dry-run mode"
          fi

      - name: Run SDK Tests
        shell: bash
        run: |
          if [[ -f "creds.json" ]]; then
            echo "Running SDK tests with connector credentials"
          else
            echo "Running SDK tests without connector credentials (dry-run mode)"
          fi
          make -C sdk test

      - name: Regenerate SDK code
        shell: bash
        run: make -C sdk generate

      - name: Check for uncommitted changes
        shell: bash
        run: |
          git diff --exit-code || (echo "ERROR: Generated SDK code is out of date. Run 'make -C sdk generate' and commit the changes." && exit 1)
